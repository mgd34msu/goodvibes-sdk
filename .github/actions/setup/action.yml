name: Setup Bun + dependencies
description: Pin Bun, restore its install cache, and run `bun install --frozen-lockfile`.
  THE single setup for every GoodVibes repo. Bun version has one source — the
  bun-version input (default below) — which repos may override with a BUN_VERSION
  repo variable. Cache and frozen-lockfile are always on.

inputs:
  bun-version:
    description: Bun version to pin. Single source of truth for the estate; pass
      a repo variable (vars.BUN_VERSION, wrapped in an expression at the call
      site) to override the default. Expressions cannot appear literally in
      this description — GitHub's template validator evaluates them even here.
    required: false
    default: "1.3.10"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}
    - name: Restore Bun install cache
      id: bun-cache-restore
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
    - name: Save Bun install cache
      if: always() && steps.bun-cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
