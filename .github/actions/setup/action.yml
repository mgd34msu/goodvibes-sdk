name: Setup Bun + dependencies
description: Pin Bun, restore its install cache, and run `bun install`. Factored
  out of ci.yml so every job shares one cache hit instead of each job cold-installing.

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: "1.3.10"
    - name: Restore Bun install cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
        save-always: true
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
