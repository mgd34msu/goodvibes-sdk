version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # 5 open PRs: enough to batch patch groups without flooding the review queue.
    # Increase if you want minor/major updates to flow through faster.
    open-pull-requests-limit: 5
    groups:
      production-patches:
        dependency-type: production
        update-types:
          - "version-update:semver-patch"
      development-patches:
        dependency-type: development
        update-types:
          - "version-update:semver-patch"
      production:
        dependency-type: production
      development:
        dependency-type: development
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions-patches:
        update-types:
          - "version-update:semver-patch"
      github-actions-minor:
        update-types:
          - "version-update:semver-minor"
      github-actions-major:
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "github-actions"
