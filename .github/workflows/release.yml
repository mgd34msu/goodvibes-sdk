name: Release

# Default to read-only permissions. Individual jobs elevate as needed.
# The `production` environment (referenced by publish-npm) must be configured in
# GitHub repo settings with required reviewers and deployment branch
# restrictions (tags only). This YAML alone cannot enforce manual approval; the
# gate lives in the GitHub UI at Settings > Environments > production.
#
# By-reference release (2026-07-16 redesign): validation happened exactly once,
# on the release commit's push-CI run. This workflow VERIFIES that run is
# per-job green (release-verify, ~2m) instead of re-running the 45-minute gate
# suite, then restores that CI run's build artifact for publish after an
# integrity check (recorded head SHA == tagged SHA). Tagging is gated on push-CI
# green, which structurally retires the tag-redo dance.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (default; pack preview, no registry write) or release (publish the dispatched tag)"
        required: false
        type: choice
        options:
          - dry-run
          - release
        default: dry-run
      dry_run:
        description: "Legacy dry-run guard (used only for a non-release dispatch)"
        required: false
        default: "true"
      ref:
        description: "Git ref to dry-run (ignored in release mode, which uses the dispatched tag ref)"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  # Falls back to run_id (unique per run) for workflow_dispatch without a ref,
  # so manual dry-runs never cancel each other. Push events use the tag name.
  group: sdk-release-${{ github.event.inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  verify-tag-version:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Verify git tag matches package.json version
        run: bun scripts/verify-release-tag-version.ts

  # By-reference validation: verify the tagged commit's push-CI run is per-job
  # green. Replaces the old 45-minute validate-release re-run. Emits the CI run
  # id + head SHA so publish-npm can restore that run's build artifact.
  #
  # toolchain-source: workspace — the SDK MUST self-host per-job-green from the
  # checked-out commit. bunx-from-registry would deadlock the first release
  # (this release is what publishes @pellux/goodvibes-toolchain) and would make
  # every later release verify itself with the PREVIOUS toolchain version.
  release-verify:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')
    needs: [verify-tag-version]
    # Caller permissions must be a superset of what the called workflow's jobs
    # request, or GitHub rejects the whole workflow at startup (jobs: []).
    permissions:
      contents: read
      actions: read
      checks: read
    uses: ./.github/workflows/reusable-release-verify.yml
    with:
      sha: ${{ github.sha }}
      workflow: ci.yml
      toolchain-source: workspace
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify-tag-version]
    if: >-
      always() &&
      (
        (
          (github.event_name == 'push' ||
           (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')) &&
          needs.verify-tag-version.result == 'success'
        ) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'release' &&
         needs.verify-tag-version.result == 'skipped')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Release-mode dispatch runs at the tag ref (github.ref); a non-release
          # dispatch uses its input ref; a push uses the pushed tag ref.
          ref: ${{ (github.event.inputs.mode == 'release' && github.ref) || github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate and validate SBOM (CycloneDX JSON)
        run: bun run sbom:check
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 90

  # Manual dispatch is dry-run only — it never publishes. The push path is the
  # only way to a real publish, and publish-npm is `if: push` gated below.
  dry-run:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Reject manual non-dry-run release
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "workflow_dispatch releases are dry-run only; push a verified v* tag to publish." >&2
          exit 1
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Release dry run (pack + publish preview, no registry write)
        run: bun run release:dry-run

  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, release-verify, generate-sbom]
    if: >-
      always() &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')) &&
      needs.verify-tag-version.result == 'success' &&
      needs.release-verify.result == 'success' &&
      needs.generate-sbom.result == 'success'
    environment:
      name: production
      url: https://www.npmjs.com/package/@pellux/goodvibes-sdk
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Release-mode dispatch restores + publishes the tag ref (github.ref);
          # a push uses the pushed tag ref. Never the "main" input default here.
          ref: ${{ (github.event.inputs.mode == 'release' && github.ref) || github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # Artifact-integrity handoff: restore the exact build the CI run produced
      # for this SHA (not a fresh throwaway build), and assert the run's recorded
      # head SHA equals the tagged SHA before trusting its bytes.
      #
      # Guard FIRST on an empty run id: the per-job-green check-suites fallback
      # can verify green without resolving the Actions run id. An empty run-id
      # fed to download-artifact silently misdirects the download (it stops
      # targeting the CI run), so fail early and honestly instead.
      - name: Require a resolved CI run id for the artifact restore
        env:
          RUN_ID: ${{ needs.release-verify.outputs.run_id }}
        run: |
          if [ -z "$RUN_ID" ]; then
            echo "release-verify reported green but could not resolve the CI run id (check-suites fallback path)." >&2
            echo "The publish job restores the CI build artifact BY RUN ID; without it the download would" >&2
            echo "misdirect to the current Release run. Re-run this workflow once the Actions API recovers" >&2
            echo "so release-verify resolves the run id, then publish proceeds normally." >&2
            exit 1
          fi
          echo "CI run id resolved: $RUN_ID"
      - name: Assert recorded head SHA matches the tagged SHA
        env:
          RECORDED_SHA: ${{ needs.release-verify.outputs.head_sha }}
          TAGGED_SHA: ${{ github.sha }}
        run: |
          if [ "$RECORDED_SHA" != "$TAGGED_SHA" ]; then
            echo "Artifact integrity check FAILED: CI build head SHA ($RECORDED_SHA) != tagged SHA ($TAGGED_SHA)." >&2
            exit 1
          fi
          echo "Artifact integrity OK: $RECORDED_SHA == $TAGGED_SHA"
      - name: Download CI build artifact (by recorded run id)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
          run-id: ${{ needs.release-verify.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore workspace build output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Verify npm registry is empty or complete for this version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun scripts/verify-published-packages.ts --prepublish-empty-or-complete
      - name: Publish packages (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish:ci
      - name: Verify published packages (propagation poll)
        env:
          GOODVIBES_VERIFY_ATTEMPTS: "48"
          GOODVIBES_VERIFY_DELAY_MS: "5000"
        run: bun run release:verify:published

  github-release:
    # Create the GitHub release only after npm publish and SBOM generation succeed.
    if: >-
      always() &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release')) &&
      needs.publish-npm.result == 'success' &&
      needs.generate-sbom.result == 'success'
    needs: [publish-npm, generate-sbom]
    # Pinned to ubuntu-24.04 (not ubuntu-latest) to prevent BSD awk semantics
    # from silently breaking the changelog extraction step.
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Download SBOM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-cdx-json
          path: /tmp/release-artifacts
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog excerpt
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Release notes are extracted directly from CHANGELOG.md.
          EXCERPT=$(awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]([[:space:]]|-|$)" { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md)
          if [ -z "$EXCERPT" ]; then
            EXCERPT="Release ${VERSION}"
          fi
          printf '%s\n' "$EXCERPT" > /tmp/release_notes.md
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body }}
          files: |
            /tmp/release-artifacts/sbom.cdx.json
