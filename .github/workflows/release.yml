name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the full release pipeline without publishing to npm"
        required: false
        default: "true"
      ref:
        description: "Git ref to release"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  group: sdk-release-${{ github.event.inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  verify-tag-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.ref }}
      - name: Verify git tag matches package.json version
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -e "process.stdout.write(require('./packages/sdk/package.json').version)")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "${TAG_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "ERROR: Git tag '${TAG_NAME}' does not match package.json version '${PKG_VERSION}' (expected tag: '${EXPECTED_TAG}')." >&2
            exit 1
          fi
          echo "Tag verification OK: ${TAG_NAME} == v${PKG_VERSION}"
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify internal contracts mirror is in sync
        run: bun run sync:check

  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify-tag-version]
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install
      - name: Generate SBOM (CycloneDX JSON)
        run: bun run sbom:generate
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 90

  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, generate-sbom]
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped') && (needs.generate-sbom.result == 'success' || needs.generate-sbom.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install
      - name: Validate workspace
        run: bun run validate
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: bun run release:dry-run
      - name: Publish packages (with provenance)
        if: github.event_name == 'push'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish:ci
      - name: Verify published packages
        if: github.event_name == 'push'
        run: bun run release:verify:published

  publish-github-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, generate-sbom]
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped') && (needs.generate-sbom.result == 'success' || needs.generate-sbom.result == 'skipped')
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GOODVIBES_PUBLIC_PACKAGE_NAME: ${{ format('@{0}/goodvibes-sdk', github.repository_owner) }}
      GOODVIBES_PUBLISH_REGISTRY: https://npm.pkg.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: bun install
      - name: Validate workspace
        run: bun run validate
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:dry-run
      - name: Publish package mirror
        if: github.event_name == 'push'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:publish
      - name: Verify published package mirror
        if: github.event_name == 'push'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:verify:published

  github-release:
    # Run if npm publish succeeded, even if smoke-check or GitHub Packages verify failed.
    # SBOM should always attach when the package is published — downstream smoke failures
    # must not block the release artifact from being complete.
    if: always() && github.event_name == 'push' && needs.publish-npm.result == 'success' && needs.generate-sbom.result == 'success'
    needs: [publish-npm, publish-github-packages, generate-sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cdx-json
          path: /tmp/release-artifacts
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog excerpt
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DOC="docs/releases/${VERSION}.md"
          if [ -f "$RELEASE_DOC" ]; then
            cp "$RELEASE_DOC" /tmp/release_notes.md
          else
            EXCERPT=$(awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]([[:space:]]|-|$)" { in_section = 1; next }
              in_section && /^## / { exit }
              in_section { print }
            ' CHANGELOG.md)
            if [ -z "$EXCERPT" ]; then
              EXCERPT="Release ${VERSION}"
            fi
            printf '%s\n' "$EXCERPT" > /tmp/release_notes.md
          fi
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body }}
          files: |
            /tmp/release-artifacts/sbom.cdx.json
