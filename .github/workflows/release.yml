name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the full release pipeline without publishing to npm"
        required: false
        default: "true"
      ref:
        description: "Git ref to release"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  group: sdk-release-${{ github.event.inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install
      - name: Validate workspace
        run: bun run validate
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: bun run release:dry-run
      - name: Publish packages
        if: github.event_name == 'push'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish
      - name: Verify published packages
        if: github.event_name == 'push'
        run: bun run release:verify:published

  publish-github-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GOODVIBES_PUBLIC_PACKAGE_NAME: ${{ format('@{0}/goodvibes-sdk', github.repository_owner) }}
      GOODVIBES_PUBLISH_REGISTRY: https://npm.pkg.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: bun install
      - name: Validate workspace
        run: bun run validate
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:dry-run
      - name: Publish package mirror
        if: github.event_name == 'push'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:publish
      - name: Verify published package mirror
        if: github.event_name == 'push'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:verify:published

  github-release:
    if: github.event_name == 'push'
    needs: [publish-npm, publish-github-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog excerpt
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DOC="docs/releases/${VERSION}.md"
          if [ -f "$RELEASE_DOC" ]; then
            cp "$RELEASE_DOC" /tmp/release_notes.md
          else
            EXCERPT=$(awk "/^## ${VERSION}$/,/^## /{if (/^## ${VERSION}$/) next; if (/^## /) exit; print}" CHANGELOG.md)
            if [ -z "$EXCERPT" ]; then
              EXCERPT="Release ${VERSION}"
            fi
            printf '%s\n' "$EXCERPT" > /tmp/release_notes.md
          fi
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body }}
