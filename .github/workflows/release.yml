name: Release

# Default to read-only permissions. Individual jobs elevate as needed.
# The `production` environment (referenced by publish-npm)
# must be configured in GitHub repo settings with required reviewers and deployment
# branch restrictions (tags only). This YAML alone cannot enforce manual approval;
# the gate lives in the GitHub UI at Settings > Environments > production.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the full release pipeline without publishing to npm"
        required: false
        default: "true"
      ref:
        description: "Git ref to release"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  # Falls back to run_id (unique per run) for workflow_dispatch without a ref,
  # so manual dry-runs never cancel each other. Push events use the tag name.
  group: sdk-release-${{ github.event.inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  verify-tag-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Verify git tag matches package.json version
        run: bun scripts/verify-release-tag-version.ts

  # Note: each release job runs its own `bun install --frozen-lockfile` (~30 s each)
  # rather than using the .github/actions/setup composite action. The install is
  # repeated across generate-sbom, validate-release, and publish-npm to keep each
  # job self-contained (the release pipeline
  # does not use caching to guarantee a pristine install before publish).
  # Keep this path uncached and self-contained; publish jobs must prove they can
  # install from the lockfile without relying on an earlier job's dependency cache.
  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify-tag-version]
    if: >-
      always() &&
      (
        (github.event_name == 'push' && needs.verify-tag-version.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && needs.verify-tag-version.result == 'skipped')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate and validate SBOM (CycloneDX JSON)
        run: bun run sbom:check
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 90

  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [verify-tag-version, generate-sbom]
    # Gate: verify-tag-version runs only on `push` (tag push); it is skipped on
    # workflow_dispatch (manual dry-runs). Explicit success/skipped checks avoid
    # accidentally accepting unexpected result states (e.g. 'cancelled').
    # The downstream publish steps are each independently gated by
    # `if: github.event_name == 'push'`, so a manual dispatch cannot trigger a
    # real publish even when tag-verification is skipped.
    # WARNING: Removing any inner `github.event_name == 'push'` gate on a publish
    # step would allow manual dispatch to publish without tag verification.
    if: >-
      always() &&
      needs.generate-sbom.result == 'success' &&
      (
        (github.event_name == 'push' && needs.verify-tag-version.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && needs.verify-tag-version.result == 'skipped')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Reject manual non-dry-run release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        run: |
          echo "workflow_dispatch releases are dry-run only; push a verified v* tag to publish." >&2
          exit 1
      - name: Validate workspace once before publish jobs
        run: bun run validate
      - name: Security audit
        run: bun run security:audit
      - name: Run Bun test suite
        run: bun run test
      - name: Run React Native bundle guard
        run: bun run test:rn
      - name: Run Workers tests
        run: bun run test:workers
      - name: Run Wrangler Workers tests
        run: bun run test:workers:wrangler
      - name: Verify generated contract artifacts
        run: bun run contracts:check
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: bun run release:dry-run
      - name: Archive workspace build output
        run: tar -czf /tmp/workspace-build-output.tgz packages/*/dist
      - name: Upload workspace build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output.tgz
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, generate-sbom, validate-release]
    if: >-
      always() &&
      github.event_name == 'push' &&
      needs.generate-sbom.result == 'success' &&
      needs.validate-release.result == 'success' &&
      needs.verify-tag-version.result == 'success'
    environment:
      name: production
      url: https://www.npmjs.com/package/@pellux/goodvibes-sdk
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download workspace build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace build output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Verify npm registry is empty or complete for this version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun scripts/verify-published-packages.ts --prepublish-empty-or-complete
      - name: Publish packages (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish:ci
      - name: Verify published packages
        env:
          GOODVIBES_VERIFY_ATTEMPTS: "48"
          GOODVIBES_VERIFY_DELAY_MS: "5000"
        run: bun run release:verify:published

  github-release:
    # Gate: create the GitHub release only after npm publish and SBOM generation succeed.
    if: always() && github.event_name == 'push' && needs.publish-npm.result == 'success' && needs.generate-sbom.result == 'success'
    needs: [publish-npm, generate-sbom]
    # Pinned to ubuntu-24.04 (not ubuntu-latest) to prevent BSD awk semantics from
    # silently breaking the changelog extraction step if the runner image changes.
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Download SBOM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-cdx-json
          path: /tmp/release-artifacts
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog excerpt
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Release notes are extracted directly from CHANGELOG.md.
          # docs/releases/<version>.md is not used; CHANGELOG is the single source of truth.
          EXCERPT=$(awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]([[:space:]]|-|$)" { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md)
          if [ -z "$EXCERPT" ]; then
            EXCERPT="Release ${VERSION}"
          fi
          printf '%s\n' "$EXCERPT" > /tmp/release_notes.md
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body }}
          files: |
            /tmp/release-artifacts/sbom.cdx.json
