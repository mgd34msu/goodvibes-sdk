name: Release

# Default to read-only permissions. Individual jobs elevate as needed.
# The `production` environment (referenced by publish-npm and publish-github-packages)
# must be configured in GitHub repo settings with required reviewers and deployment
# branch restrictions (tags only). This YAML alone cannot enforce manual approval;
# the gate lives in the GitHub UI at Settings > Environments > production.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the full release pipeline without publishing to npm"
        required: false
        default: "true"
      ref:
        description: "Git ref to release"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  # Falls back to run_id (unique per run) for workflow_dispatch without a ref,
  # so manual dry-runs never cancel each other. Push events use the tag name.
  group: sdk-release-${{ github.event.inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  verify-tag-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Verify git tag matches package.json version
        run: bun scripts/verify-release-tag-version.ts

  generate-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify-tag-version]
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate SBOM (CycloneDX JSON)
        run: bun run sbom:generate
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 90

  validate-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, generate-sbom]
    # Gate note: `(verify-tag-version == 'success' || == 'skipped')` is intentional.
    # verify-tag-version only runs on `push` events (tag push); it is skipped on
    # workflow_dispatch (manual dry-runs). The downstream publish steps are each
    # independently gated by `if: github.event_name == 'push'`, so a manual
    # dispatch cannot trigger a real publish even when tag-verification is skipped.
    # WARNING: Removing any inner `github.event_name == 'push'` gate on a publish
    # step would allow manual dispatch to publish without tag verification.
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped') && (needs.generate-sbom.result == 'success' || needs.generate-sbom.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate workspace once before publish jobs
        run: bun run validate
      - name: Verify generated contract artifacts
        run: bun run contracts:check
      - name: Archive workspace build output
        run: tar -czf /tmp/workspace-build-output.tgz packages/*/dist
      - name: Upload workspace build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output.tgz
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, generate-sbom, validate-release]
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped') && (needs.generate-sbom.result == 'success' || needs.generate-sbom.result == 'skipped') && needs.validate-release.result == 'success'
    environment:
      name: production
      # Note: hardcoded to the default npm package name. A workflow_dispatch with
      # GOODVIBES_PUBLIC_PACKAGE_NAME override will still show this URL in the
      # GitHub UI environment widget (cosmetic only — does not affect publish logic).
      url: https://www.npmjs.com/package/@pellux/goodvibes-sdk
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download workspace build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace build output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: bun run release:dry-run
      - name: Publish packages (with provenance)
        if: github.event_name == 'push'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release:publish:ci
      - name: Verify published packages
        if: github.event_name == 'push'
        env:
          GOODVIBES_VERIFY_ATTEMPTS: "48"
          GOODVIBES_VERIFY_DELAY_MS: "5000"
        run: bun run release:verify:published

  publish-github-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [verify-tag-version, generate-sbom, validate-release]
    if: always() && (needs.verify-tag-version.result == 'success' || needs.verify-tag-version.result == 'skipped') && (needs.generate-sbom.result == 'success' || needs.generate-sbom.result == 'skipped') && needs.validate-release.result == 'success'
    environment:
      name: production
      url: https://github.com/orgs/${{ github.repository_owner }}/packages
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GOODVIBES_PUBLIC_PACKAGE_NAME: ${{ format('@{0}/goodvibes-sdk', github.repository_owner) }}
      GOODVIBES_PUBLISH_REGISTRY: https://npm.pkg.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download workspace build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace build output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Release dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:dry-run
      - name: Publish GitHub Packages copy
        if: github.event_name == 'push'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release:publish
      - name: Verify GitHub Packages copy
        if: github.event_name == 'push'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOODVIBES_VERIFY_ATTEMPTS: "48"
          GOODVIBES_VERIFY_DELAY_MS: "5000"
        run: bun run release:verify:published

  github-release:
    # Gate: runs only when publish-npm succeeded (regardless of other job outcomes).
    # smoke-check and GitHub Packages verify failures must not block the release
    # artifact — the SBOM must attach whenever the package is published.
    if: always() && github.event_name == 'push' && needs.publish-npm.result == 'success' && needs.generate-sbom.result == 'success'
    needs: [publish-npm, publish-github-packages, generate-sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Download SBOM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-cdx-json
          path: /tmp/release-artifacts
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog excerpt
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RELEASE_DOC="docs/releases/${VERSION}.md"
          if [ -f "$RELEASE_DOC" ]; then
            cp "$RELEASE_DOC" /tmp/release_notes.md
          else
            EXCERPT=$(awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]([[:space:]]|-|$)" { in_section = 1; next }
              in_section && /^## / { exit }
              in_section { print }
            ' CHANGELOG.md)
            if [ -z "$EXCERPT" ]; then
              EXCERPT="Release ${VERSION}"
            fi
            printf '%s\n' "$EXCERPT" > /tmp/release_notes.md
          fi
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body }}
          files: |
            /tmp/release-artifacts/sbom.cdx.json
