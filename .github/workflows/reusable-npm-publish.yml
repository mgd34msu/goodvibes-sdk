# Reusable: npm publish (staged, provenance, propagation poll)
#
# Consumer contract
#   Publishes a package to npm with provenance from the `production`-style
#   environment, verifying the registry is empty-or-complete for the version
#   before publishing and polling propagation after. One implementation, one set
#   of constants (the toolchain `publish-package` CLI owns idempotency + poll).
#
#   Call it:
#     jobs:
#       publish:
#         uses: mgd34msu/goodvibes-sdk/.github/workflows/reusable-npm-publish.yml@main
#         with:
#           package-name: "@pellux/goodvibes-tui"
#           environment: production
#         secrets:
#           npm-token: ${{ secrets.NPM_TOKEN }}
#
#   Inputs:  package-name (required, for the environment URL + poll), environment
#            (default production), registry, publish-command (how the repo
#            publishes — default the toolchain CLI), tarball-artifact (optional),
#            bun-version, node-version.
#   Secrets: npm-token (required).
#
#   The job requests id-token: write so npm records build provenance. The
#   environment (configured in repo settings with required reviewers / tag-only
#   deployment branches) is the human gate; this YAML cannot enforce approval.
#
#   Prebuilt-tarball publish (tarball-artifact):
#     Consumers whose npm bytes are produced by a separate pack job — e.g. the
#     agent repo bundles a runtime (`bun run build:package-runtime`) before
#     `bun pm pack` — must publish the STAGED .tgz, not a bare checkout.
#     Pass `tarball-artifact: <name>` (the upload-artifact name of the packed
#     .tgz) and a `publish-command` that publishes that staged file. When set,
#     this workflow downloads the artifact into ./release-tarball/ before the
#     publish step. Example:
#       with:
#         tarball-artifact: agent-npm-tarball
#         publish-command: >-
#           bunx @pellux/goodvibes-toolchain goodvibes-publish-package --poll
#           --tarball "./$(ls release-tarball/*.tgz)"   # ./ prefix required: npm parses a bare a/b path as a GitHub spec
#     Glob resolution is the consumer command's problem (the `ls` above). With
#     no tarball-artifact the download step is skipped and behavior is
#     byte-identical to the default pack-and-publish-cwd path.

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: production
      registry:
        required: false
        type: string
        default: "https://registry.npmjs.org"
      publish-command:
        description: Command that publishes + polls (idempotent). Runs after the
          empty-or-complete precheck. Default uses the toolchain CLI.
        required: false
        type: string
        default: "bunx @pellux/goodvibes-toolchain goodvibes-publish-package --poll"
      tarball-artifact:
        description: Optional upload-artifact name of a prebuilt .tgz to publish.
          When non-empty it is downloaded into ./release-tarball/ before the
          publish step (for repos whose npm bytes come from a separate pack job).
          Empty (default) keeps the pack-and-publish-cwd behavior byte-identical.
        required: false
        type: string
        default: ""
      bun-version:
        required: false
        type: string
        default: "1.3.10"
      node-version:
        required: false
        type: string
        default: "22"
    secrets:
      npm-token:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: ${{ inputs.environment }}
      url: https://www.npmjs.com/package/${{ inputs.package-name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry }}
      - name: Download prebuilt publish tarball
        if: inputs.tarball-artifact != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.tarball-artifact }}
          path: ./release-tarball
      - name: Publish (idempotent) + propagation poll
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}
          GOODVIBES_PUBLISH_REGISTRY: ${{ inputs.registry }}
        run: ${{ inputs.publish-command }}
