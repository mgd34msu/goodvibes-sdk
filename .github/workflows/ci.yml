name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Kitchen-sink gate: docs check, typecheck, browser compat, metadata,
  # no-any, pack check, install smoke. Deliberately self-contained — this is
  # the 'everything works atomically' integration check that mirrors what a
  # local developer runs via `bun run validate`.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Validate workspace
        run: bun run validate

  # ---------------------------------------------------------------------------
  # Single build job. Uploads packages/sdk/dist as an artifact so downstream
  # consumers test the exact same bytes. Ensures build determinism across
  # all typed-surface and packaging checks; matches the release pipeline which
  # builds once and publishes that artifact to npm.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Build SDK
        run: bun run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: packages/sdk/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Sync mirror guard for the transport-http package. Cheap.
  # ---------------------------------------------------------------------------
  mirror-drift:
    name: Mirror drift guard (transport-http)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Check transport-http mirror parity
        run: bun run sync:check

  # ---------------------------------------------------------------------------
  # Platform matrix — each platform builds and runs its test suite. Isolated
  # because rn-bundle, workers, and workers-wrangler each exercise a distinct
  # runtime target that the consolidated artifact would not cover.
  # ---------------------------------------------------------------------------
  platform-matrix:
    name: Platform matrix (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bun
          - rn-bundle
          - workers
          - workers-wrangler
        include:
          - platform: bun
            node-version: "22"
            test-cmd: bun run build && bun run test
          - platform: rn-bundle
            node-version: "22"
            test-cmd: bun run build && bun run test:rn
          - platform: workers
            node-version: "22"
            test-cmd: bun run test:workers
          - platform: workers-wrangler
            node-version: "22"
            test-cmd: bun run test:workers:wrangler
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Run test suite (${{ matrix.platform }})
        run: ${{ matrix.test-cmd }}

  # ---------------------------------------------------------------------------
  # Consolidated lint-style gates. Previously three separate jobs
  # (throw-guard, changelog-check, version-consistency); merged here to cut
  # cold-start overhead. Each step is independent, so one failure still shows
  # up distinctly in the logs.
  # ---------------------------------------------------------------------------
  lint-gates:
    name: Lint gates (throw / changelog / version)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Raw throw guard
        run: |
          set -euo pipefail
          # Scan canonical package source (exclude _internal mirror, errors package, tests)
          if rg --type ts \
               -l \
               -e 'throw new Error\(' \
               -e 'throw Error\(' \
               -e 'throw \{' \
               -e "throw '" \
               -e 'throw "' \
               packages \
               --glob '**/src/**' \
               --glob '!**/_internal/**' \
               --glob '!**/errors/**' \
               --glob '!**/*.test.ts' \
               --glob '!**/tests/**' \
               --glob '!**/__tests__/**' \
               2>/dev/null | grep -q .; then
            echo "ERROR: Raw throw found in public SDK source." >&2
            rg --type ts \
               -n \
               -e 'throw new Error\(' \
               -e 'throw Error\(' \
               -e 'throw \{' \
               -e "throw '" \
               -e 'throw "' \
               packages \
               --glob '**/src/**' \
               --glob '!**/_internal/**' \
               --glob '!**/errors/**' \
               --glob '!**/*.test.ts' \
               --glob '!**/tests/**' \
               --glob '!**/__tests__/**' >&2 || true
            exit 1
          fi
          echo "throw-guard: no raw throws found in public source."
      - name: Changelog gate
        run: bun run changelog:check
      - name: Version consistency
        run: bun run version:check

  # ---------------------------------------------------------------------------
  # Consumer jobs that share the build artifact. Each tests the exact same
  # bytes produced by the `build` job — eliminates the 4-parallel-builds
  # non-determinism window the old CI had.
  # ---------------------------------------------------------------------------
  types-check:
    name: Public type surface check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Check public type signatures
        run: bun run types:check

  types-resolution-check:
    name: Are the types wrong? (exports map resolution)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Run are-the-types-wrong check
        run: bunx attw --pack packages/sdk --ignore-rules no-resolution cjs-resolves-to-esm

  publint-check:
    name: publint (package.json hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Run publint
        run: bun run publint:check

  sbom-check:
    name: SBOM generation + validation (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Generate SBOM
        run: bun run sbom:generate
      - name: Assert SBOM is non-empty
        run: |
          set -euo pipefail
          if [ ! -f sbom.cdx.json ]; then
            echo "ERROR: sbom.cdx.json was not generated." >&2
            exit 1
          fi
          SIZE=$(wc -c < sbom.cdx.json)
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: sbom.cdx.json is suspiciously small (${SIZE} bytes)." >&2
            exit 1
          fi
          echo "sbom-check: sbom.cdx.json is ${SIZE} bytes — OK"
      - name: Validate SBOM schema (CycloneDX)
        run: |
          set -euo pipefail
          node -e "
            const sbom = JSON.parse(require('fs').readFileSync('sbom.cdx.json', 'utf8'));
            if (!sbom.bomFormat || sbom.bomFormat !== 'CycloneDX') {
              console.error('ERROR: bomFormat is not CycloneDX'); process.exit(1);
            }
            if (!sbom.specVersion) {
              console.error('ERROR: specVersion missing'); process.exit(1);
            }
            if (!sbom.components || !Array.isArray(sbom.components)) {
              console.error('ERROR: components array missing'); process.exit(1);
            }
            console.log('SBOM schema OK — specVersion:', sbom.specVersion, 'components:', sbom.components.length);
          "
      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # PR-only guard: detects mass deletions of mirrored files that `sync --scope=all`
  # would remove. Intentionally skipped on push-to-main — post-merge drift is
  # caught by mirror-drift; this job exists to block the PR before merge.
  # ---------------------------------------------------------------------------
  sync-safety-check:
    name: Sync safety check (mirror drift + deletion guard)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Check all mirrors are in sync
        run: bun run sync:check
      - name: Guard against mass deletions
        run: |
          set -euo pipefail
          # Count how many mirror files would be deleted if we ran sync --scope=all
          # A deletion happens when a mirror file has no canonical counterpart.
          # We detect this by counting files reported as STALE by sync:check stderr,
          # but sync:check already exits 1 if there is any drift, so we run a
          # separate stale-file count using the same logic.
          STALE_COUNT=$(
            node -e "
              const { readdirSync, existsSync } = require('fs');
              const { resolve, relative } = require('path');
              const ROOT = process.cwd();
              const INTERNAL = resolve(ROOT, 'packages/sdk/src/_internal');
              const CANONICAL_DIRS = {
                contracts: 'packages/contracts/src',
                errors: 'packages/errors/src',
                daemon: 'packages/daemon-sdk/src',
                'transport-core': 'packages/transport-core/src',
                'transport-direct': 'packages/transport-direct/src',
                'transport-http': 'packages/transport-http/src',
                'transport-realtime': 'packages/transport-realtime/src',
                operator: 'packages/operator-sdk/src',
                peer: 'packages/peer-sdk/src',
              };
              function walk(dir) {
                const files = [];
                for (const e of readdirSync(dir, { withFileTypes: true })) {
                  const full = resolve(dir, e.name);
                  if (e.isDirectory()) files.push(...walk(full));
                  else if (e.isFile() && e.name.endsWith('.ts')) files.push(full);
                }
                return files;
              }
              let stale = 0;
              for (const [scope, canonDir] of Object.entries(CANONICAL_DIRS)) {
                const mirrorDir = resolve(INTERNAL, scope);
                if (!existsSync(mirrorDir)) continue;
                const canonSet = new Set(walk(resolve(ROOT, canonDir)).map(p => relative(resolve(ROOT, canonDir), p)));
                for (const mf of walk(mirrorDir)) {
                  if (!canonSet.has(relative(mirrorDir, mf))) stale++;
                }
              }
              console.log(stale);
            "
          )
          echo "Stale mirror files (would be deleted by sync --scope=all): $STALE_COUNT"
          MAX_DELETIONS=10
          if [ "$STALE_COUNT" -gt "$MAX_DELETIONS" ]; then
            echo "ERROR: $STALE_COUNT mirror files would be deleted, exceeding threshold of $MAX_DELETIONS." >&2
            echo "This likely means canonical files were removed without updating the mirror." >&2
            echo "Run: bun run sync --scope=<affected-scope> to regenerate, then verify intent." >&2
            exit 1
          fi
          echo "Deletion guard passed — $STALE_COUNT stale file(s) within threshold."
