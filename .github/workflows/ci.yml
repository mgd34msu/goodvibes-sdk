name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Default to read-only permissions. Individual jobs elevate as needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Kitchen-sink gate: docs check, typecheck, browser compat, metadata,
  # no-any, pack check, install smoke. Deliberately self-contained — this is
  # the 'everything works atomically' integration check that matches what a
  # local developer runs via `bun run validate`.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup # composite, no SHA needed
      - name: Validate workspace
        run: bun run validate

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents: read (inherited from workflow default) is sufficient for gitleaks.
    # Add pull-requests: write here if you want gitleaks to comment on PRs.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Dependency audit
        run: bun audit --audit-level high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Single build job. Uploads all package dist directories as one artifact so
  # downstream consumers test the exact same workspace package bytes. Ensures build determinism across
  # all typed-surface and packaging checks; matches the release pipeline which
  # builds once and publishes that artifact to npm.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Build SDK
        run: bun run build
      - name: Archive workspace package output
        run: tar -czf /tmp/workspace-build-output.tgz packages/*/dist
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output.tgz
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Platform matrix — each platform builds and runs its test suite. Isolated
  # because rn-bundle, workers, and workers-wrangler each exercise a distinct
  # runtime target that the consolidated artifact would not cover.
  # ---------------------------------------------------------------------------
  platform-matrix:
    name: Platform matrix (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bun
          - rn-bundle
          - workers
          - workers-wrangler
        include:
          # Matrix policy: single Node version (22) per run. Add a second
          # `include` row targeting Node 24 LTS once it is released to expand
          # runtime coverage without multiplying CI time unnecessarily.
          - platform: bun
            node-version: "22"
            test-cmd: bun run build && bun run test
          - platform: rn-bundle
            node-version: "22"
            test-cmd: bun run build && bun run test:rn
          - platform: workers
            node-version: "22"
            test-cmd: bun run build && bun run test:workers
          - platform: workers-wrangler
            node-version: "22"
            test-cmd: bun run build && bun run test:workers:wrangler
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Run test suite (${{ matrix.platform }})
        run: ${{ matrix.test-cmd }}

  # ---------------------------------------------------------------------------
  # Consumer jobs that share the build artifact. Each tests the exact same
  # bytes produced by the `build` job — eliminates the 4-parallel-builds
  # non-determinism window from independent package builds.
  # ---------------------------------------------------------------------------
  types-resolution-check:
    name: Are the types wrong? (exports map resolution)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Run are-the-types-wrong check
        run: bunx attw --pack packages/sdk --ignore-rules no-resolution cjs-resolves-to-esm

  publint-check:
    name: publint (package.json hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Run publint
        run: bun run publint:check

  sbom-check:
    name: SBOM generation + validation (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
      - name: Generate and validate SBOM
        run: bun run sbom:check
      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 30
