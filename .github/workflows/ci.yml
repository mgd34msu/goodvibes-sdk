name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Validate workspace
        run: bun run validate

  mirror-drift:
    name: Mirror drift guard (transport-http)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Check transport-http mirror parity
        run: bun run sync:check

  platform-matrix:
    name: Platform matrix (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bun
          - bun-on-node20
          - bun-on-node22
          - rn-bundle
        include:
          - platform: bun
            node-version: "22"
            test-cmd: bun run build && bun test test
          - platform: bun-on-node20
            node-version: "20"
            test-cmd: bun run build && bun test test
          - platform: bun-on-node22
            node-version: "22"
            test-cmd: bun run build && bun test test
          - platform: rn-bundle
            node-version: "22"
            test-cmd: bun run build && bun run test:rn
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Run test suite (${{ matrix.platform }})
        run: ${{ matrix.test-cmd }}

  throw-guard:
    name: Raw throw guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Check for raw throws in public source
        run: |
          set -euo pipefail
          # Scan canonical package source (exclude _internal mirror, errors package, tests)
          if rg --type ts \
               -l \
               -e 'throw new Error\(' \
               -e 'throw Error\(' \
               -e 'throw \{' \
               -e "throw '" \
               -e 'throw "' \
               packages \
               --glob '**/src/**' \
               --glob '!**/_internal/**' \
               --glob '!**/errors/**' \
               --glob '!**/*.test.ts' \
               --glob '!**/tests/**' \
               --glob '!**/__tests__/**' \
               2>/dev/null | grep -q .; then
            echo "ERROR: Raw throw found in public SDK source." >&2
            rg --type ts \
               -n \
               -e 'throw new Error\(' \
               -e 'throw Error\(' \
               -e 'throw \{' \
               -e "throw '" \
               -e 'throw "' \
               packages \
               --glob '**/src/**' \
               --glob '!**/_internal/**' \
               --glob '!**/errors/**' \
               --glob '!**/*.test.ts' \
               --glob '!**/tests/**' \
               --glob '!**/__tests__/**' >&2 || true
            exit 1
          fi
          echo "throw-guard: no raw throws found in public source."

  changelog-check:
    name: Changelog gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Check CHANGELOG.md has section for current SDK version
        run: bun run changelog:check
