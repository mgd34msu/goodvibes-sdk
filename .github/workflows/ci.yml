name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Kitchen-sink gate: docs check, typecheck, browser compat, metadata,
  # no-any, pack check, install smoke. Deliberately self-contained — this is
  # the 'everything works atomically' integration check that matches what a
  # local developer runs via `bun run validate`.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Validate workspace
        run: bun run validate

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Dependency audit
        run: bun audit --audit-level high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Single build job. Uploads packages/sdk/dist as an artifact so downstream
  # consumers test the exact same bytes. Ensures build determinism across
  # all typed-surface and packaging checks; matches the release pipeline which
  # builds once and publishes that artifact to npm.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Build SDK
        run: bun run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdk-dist
          path: packages/sdk/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Generated contract artifact drift guard. Cheap.
  # ---------------------------------------------------------------------------
  contract-artifact-check:
    name: Contract artifact check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Check generated contract artifacts
        run: bun run contracts:check

  # ---------------------------------------------------------------------------
  # Platform matrix — each platform builds and runs its test suite. Isolated
  # because rn-bundle, workers, and workers-wrangler each exercise a distinct
  # runtime target that the consolidated artifact would not cover.
  # ---------------------------------------------------------------------------
  platform-matrix:
    name: Platform matrix (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bun
          - rn-bundle
          - workers
          - workers-wrangler
        include:
          - platform: bun
            node-version: "22"
            test-cmd: bun run build && bun run test
          - platform: rn-bundle
            node-version: "22"
            test-cmd: bun run build && bun run test:rn
          - platform: workers
            node-version: "22"
            test-cmd: bun run test:workers
          - platform: workers-wrangler
            node-version: "22"
            test-cmd: bun run test:workers:wrangler
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Run test suite (${{ matrix.platform }})
        run: ${{ matrix.test-cmd }}

  examples-typecheck:
    name: Examples typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Typecheck examples
        run: bun run --cwd examples typecheck

  # ---------------------------------------------------------------------------
  # Consumer jobs that share the build artifact. Each tests the exact same
  # bytes produced by the `build` job — eliminates the 4-parallel-builds
  # non-determinism window the old CI had.
  # ---------------------------------------------------------------------------
  types-check:
    name: Public type surface check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Check public type signatures
        run: bun run types:check

  types-resolution-check:
    name: Are the types wrong? (exports map resolution)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Run are-the-types-wrong check
        run: bunx attw --pack packages/sdk --ignore-rules no-resolution cjs-resolves-to-esm

  publint-check:
    name: publint (package.json hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Run publint
        run: bun run publint:check

  api-surface-check:
    name: API surface snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Check API surface snapshot
        run: bun run api:check

  bundle-budget-check:
    name: Bundle budget
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Check bundle budgets
        run: bun run bundle:check

  sbom-check:
    name: SBOM generation + validation (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sdk-dist
          path: packages/sdk/dist
      - name: Generate SBOM
        run: bun run sbom:generate
      - name: Assert SBOM is non-empty
        run: |
          set -euo pipefail
          if [ ! -f sbom.cdx.json ]; then
            echo "ERROR: sbom.cdx.json was not generated." >&2
            exit 1
          fi
          SIZE=$(wc -c < sbom.cdx.json)
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: sbom.cdx.json is suspiciously small (${SIZE} bytes)." >&2
            exit 1
          fi
          echo "sbom-check: sbom.cdx.json is ${SIZE} bytes — OK"
      - name: Validate SBOM schema (CycloneDX)
        run: |
          set -euo pipefail
          node -e "
            const sbom = JSON.parse(require('fs').readFileSync('sbom.cdx.json', 'utf8'));
            if (!sbom.bomFormat || sbom.bomFormat !== 'CycloneDX') {
              console.error('ERROR: bomFormat is not CycloneDX'); process.exit(1);
            }
            if (!sbom.specVersion) {
              console.error('ERROR: specVersion missing'); process.exit(1);
            }
            if (!sbom.components || !Array.isArray(sbom.components)) {
              console.error('ERROR: components array missing'); process.exit(1);
            }
            console.log('SBOM schema OK — specVersion:', sbom.specVersion, 'components:', sbom.components.length);
          "
      - name: Enforce license policy
        run: |
          set -euo pipefail
          node -e "
            const sbom = JSON.parse(require('fs').readFileSync('sbom.cdx.json', 'utf8'));
            const blocked = /^(?:AGPL|GPL|LGPL|SSPL)(?:-|$)/i;
            const offenders = [];
            for (const component of sbom.components ?? []) {
              const licenses = (component.licenses ?? []).flatMap((entry) => {
                if (entry.license?.id) return [entry.license.id];
                if (entry.license?.name) return [entry.license.name];
                if (entry.expression) return [entry.expression];
                return [];
              });
              if (licenses.some((license) => blocked.test(String(license)))) {
                offenders.push(component.name + '@' + component.version + ' (' + licenses.join(', ') + ')');
              }
            }
            if (offenders.length > 0) {
              console.error('Blocked license(s):\n' + offenders.join('\n'));
              process.exit(1);
            }
            console.log('License policy OK');
          "
      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 30
