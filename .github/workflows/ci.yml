name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Default to read-only permissions. Individual jobs elevate as needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Kitchen-sink gate: docs check, typecheck, browser compat, metadata,
  # no-any, pack check, install smoke. Deliberately self-contained — this is
  # the 'everything works atomically' integration check that matches what a
  # local developer runs via `bun run validate`.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    # The whole-workspace validate lane grew past 10 minutes with the memory-
    # governance and managed-voice suites; 20 keeps honest headroom without
    # masking a hang (individual bun tests carry their own timeouts).
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup # composite, no SHA needed
      - name: Validate workspace
        run: bun run validate

  # ---------------------------------------------------------------------------
  # Standing eval gate. Runs the all-floors-passing standing-gate suite through
  # the production eval paths and fails on ANY absolute-floor failure OR
  # regression versus the checked-in baseline (eval/baseline.json), with
  # per-scenario results printed. The baseline drift check runs first so a stale
  # baseline (suites/scorer changed without a deliberate `bun run eval:baseline`)
  # fails loudly rather than silently. A required job — never continue-on-error.
  # ---------------------------------------------------------------------------
  eval-gate:
    name: Eval gate (floors + regression)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      # The eval scripts execute SDK source directly (bun scripts/eval-*.ts ->
      # packages/sdk/src/...), and that source imports bare workspace specifiers
      # (@pellux/goodvibes-errors, etc.) whose package exports resolve to ./dist.
      # Restore the single `build` job's artifact instead of rebuilding — the
      # dist entrypoints those bare specifiers resolve to are the exact bytes the
      # build job produced (build once, restore everywhere).
      - name: Download workspace package output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: |
          tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
          # The artifact was built from this very SHA in this run's build job —
          # it is fresh by construction. tar preserves build-time mtimes while
          # the checkout stamps sources with checkout time, so mtime-based
          # dist-freshness checks would misread the restore as staleness.
          find packages/*/dist -type f -exec touch {} +
      - name: Baseline drift check
        run: bun run eval:baseline:check
      - name: Run eval gate
        run: bun run eval:gate

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents: read (inherited from workflow default) is sufficient for gitleaks.
    # Add pull-requests: write here if you want gitleaks to comment on PRs.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Dependency audit
        run: bun audit --audit-level high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Single build job. Uploads all package dist directories as one artifact so
  # downstream consumers test the exact same workspace package bytes. Ensures build determinism across
  # all typed-surface and packaging checks; matches the release pipeline which
  # builds once and publishes that artifact to npm.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Build SDK
        run: bun run build
      - name: Archive workspace package output
        run: tar -czf /tmp/workspace-build-output.tgz packages/*/dist
      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output.tgz
          # Retained long enough for the by-reference release to restore this
          # exact build (the artifact-integrity handoff in release.yml downloads
          # it by the CI run id and asserts its head SHA == the tagged SHA).
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Platform matrix — each platform builds and runs its test suite. Isolated
  # because rn-bundle, workers, and workers-wrangler each exercise a distinct
  # runtime target that the consolidated artifact would not cover.
  # ---------------------------------------------------------------------------
  platform-matrix:
    name: Platform matrix (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bun
          - rn-bundle
          - workers
          - workers-wrangler
        include:
          # Matrix policy: single Node version (22) per run. Add a second
          # `include` row targeting Node 24 LTS once it is released to expand
          # runtime coverage without multiplying CI time unnecessarily.
          # Each leg restores the single `build` job's artifact (below) and runs
          # tests against those exact dist bytes — no per-leg rebuild. The bun
          # leg invokes scripts/test.ts directly (not `bun run test`) so the
          # `pretest` tsc build does not re-emit over the restored artifact.
          - platform: bun
            node-version: "22"
            test-cmd: bun scripts/test.ts
          - platform: rn-bundle
            node-version: "22"
            test-cmd: bun run test:rn
          - platform: workers
            node-version: "22"
            test-cmd: bun run test:workers
          - platform: workers-wrangler
            node-version: "22"
            test-cmd: bun run test:workers:wrangler
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: |
          tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
          # The artifact was built from this very SHA in this run's build job —
          # it is fresh by construction. tar preserves build-time mtimes while
          # the checkout stamps sources with checkout time, so mtime-based
          # dist-freshness checks would misread the restore as staleness.
          find packages/*/dist -type f -exec touch {} +
      - name: Configure git identity for worktree/orchestration tests
        # The orchestration worktree flow makes real git commits and relies on
        # ambient git config (as in a real user environment). A fresh CI runner
        # has no identity, so those commits fail and the worktree integration
        # tests hang/timeout. Provide a deterministic identity.
        run: |
          git config --global user.email "ci@goodvibes.local"
          git config --global user.name "GoodVibes CI"
      - name: Run test suite (${{ matrix.platform }})
        run: ${{ matrix.test-cmd }}

  # ---------------------------------------------------------------------------
  # Consumer jobs that share the build artifact. Each tests the exact same
  # bytes produced by the `build` job — eliminates the 4-parallel-builds
  # non-determinism window from independent package builds.
  # ---------------------------------------------------------------------------
  types-resolution-check:
    name: Are the types wrong? (exports map resolution)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: |
          tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
          # The artifact was built from this very SHA in this run's build job —
          # it is fresh by construction. tar preserves build-time mtimes while
          # the checkout stamps sources with checkout time, so mtime-based
          # dist-freshness checks would misread the restore as staleness.
          find packages/*/dist -type f -exec touch {} +
      - name: Run are-the-types-wrong check
        run: bunx attw --pack packages/sdk --ignore-rules no-resolution cjs-resolves-to-esm

  publint-check:
    name: publint (package.json hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: |
          tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
          # The artifact was built from this very SHA in this run's build job —
          # it is fresh by construction. tar preserves build-time mtimes while
          # the checkout stamps sources with checkout time, so mtime-based
          # dist-freshness checks would misread the restore as staleness.
          find packages/*/dist -type f -exec touch {} +
      - name: Run publint
        run: bun run publint:check

  sbom-check:
    name: SBOM generation + validation (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: |
          tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
          # The artifact was built from this very SHA in this run's build job —
          # it is fresh by construction. tar preserves build-time mtimes while
          # the checkout stamps sources with checkout time, so mtime-based
          # dist-freshness checks would misread the restore as staleness.
          find packages/*/dist -type f -exec touch {} +
      - name: Generate and validate SBOM
        run: bun run sbom:check
      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cdx-json
          path: sbom.cdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Packaged-artifact coherence gate: pack every workspace package exactly as
  # publish would, install the tarballs into a scratch consumer, and run the
  # shipped conformance kit against a catalog/daemon composed FROM THE PACKED
  # ARTIFACTS (descriptors-have-handlers, catalog invoke round-trips, REST
  # parity). Proves the tarballs are internally coherent before publish. A
  # required job — never continue-on-error; per-check honesty lives in the
  # in-scratch conformance script (one PASS/FAIL line per check).
  # ---------------------------------------------------------------------------
  artifact-lane:
    name: Packaged-artifact release lane (conformance)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Setup Bun + deps (cached)
        uses: ./.github/actions/setup
      - name: Download workspace package output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: workspace-build-output
          path: /tmp/workspace-build-output
      - name: Restore workspace package output
        run: |
          tar -xzf /tmp/workspace-build-output/workspace-build-output.tgz -C .
          # The artifact was built from this very SHA in this run's build job —
          # it is fresh by construction. tar preserves build-time mtimes while
          # the checkout stamps sources with checkout time, so mtime-based
          # dist-freshness checks would misread the restore as staleness.
          find packages/*/dist -type f -exec touch {} +
      - name: Run packaged-artifact release lane
        run: bun run release:artifact-lane
