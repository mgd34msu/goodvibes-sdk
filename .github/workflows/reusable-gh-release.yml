# Reusable: GitHub Release (notes-file or changelog excerpt + SHA256SUMS + assets)
#
# Consumer contract
#   Creates a GitHub Release for a tag: resolves the release body (an optional
#   per-release notes file wins; otherwise the tag's CHANGELOG section is
#   extracted), generates a SHA256SUMS manifest over the staged assets via the
#   toolchain `sha256sums` CLI (a missing asset is fatal), and uploads the
#   assets with a pinned softprops/action-gh-release. One copy, parameterized by
#   the asset manifest.
#
#   Call it:
#     jobs:
#       gh-release:
#         uses: mgd34msu/goodvibes-sdk/.github/workflows/reusable-gh-release.yml@main
#         with:
#           tag: ${{ github.ref_name }}
#           artifact-name: release-assets
#           assets-glob: "dist/goodvibes-*"
#           notes-file: "docs/releases/{version}.md"   # optional prose override
#
#   Inputs:  tag (required), artifact-name (a CI artifact to download into
#            dist/, optional), assets-glob (files to hash + upload), notes-file
#            (optional release-body override; `{version}` expands to the tag
#            without its v prefix — when set AND the file exists at the
#            checked-out ref its content is the body, otherwise the changelog
#            excerpt is used exactly as before), changelog-path (default
#            CHANGELOG.md), sha256-name (default SHA256SUMS.txt), bun-version.
#
#   assets-glob accepts whitespace-separated globs — spaces or newlines. The
#   value is normalized to newline-separated form before it reaches the
#   softprops `files` sink (which splits on newlines only), so both forms
#   behave identically.
#   Runs on ubuntu-24.04 so awk changelog extraction stays GNU-stable.

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      artifact-name:
        description: Optional CI artifact to download into ./dist before staging.
        required: false
        type: string
        default: ""
      assets-glob:
        description: Whitespace-separated globs (spaces or newlines, relative to
          repo root) of assets to checksum + upload. Normalized to
          newline-separated form before use, so both separators work.
        required: true
        type: string
      notes-file:
        description: Optional release-body override. `{version}` expands to the
          tag without its v prefix. When set and the file exists at the
          checked-out ref, its content is the release body; otherwise the
          changelog excerpt is used.
        required: false
        type: string
        default: ""
      changelog-path:
        required: false
        type: string
        default: CHANGELOG.md
      sha256-name:
        required: false
        type: string
        default: SHA256SUMS.txt
      bun-version:
        required: false
        type: string
        default: "1.3.10"
      toolchain-spec:
        required: false
        type: string
        default: "@pellux/goodvibes-toolchain"

permissions:
  contents: read

jobs:
  gh-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Download release artifact
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.artifact-name }}
          path: dist
      - name: Resolve release notes (notes-file override, else changelog excerpt)
        id: changelog
        env:
          VERSION: ${{ inputs.tag }}
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
          NOTES_FILE: ${{ inputs.notes-file }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          # Precedence: a per-release notes file (e.g. docs/releases/<version>.md
          # prose) wins over the changelog excerpt when configured AND present
          # at the checked-out ref; otherwise fall back to the excerpt.
          notes_path="${NOTES_FILE//\{version\}/$version}"
          if [ -n "$notes_path" ] && [ -f "$notes_path" ]; then
            echo "Release body: notes file $notes_path"
            cp "$notes_path" /tmp/release_notes.md
          else
            if [ -n "$notes_path" ]; then
              echo "Notes file $notes_path not found at this ref — falling back to the changelog excerpt."
            fi
            excerpt="$(awk -v version="$version" '
              $0 ~ "^## (\\[)?" version "([]) -]|$)" { in_section = 1; next }
              in_section && /^## / { exit }
              in_section { print }
            ' "$CHANGELOG_PATH")"
            if [ -z "$excerpt" ]; then excerpt="Release ${version}"; fi
            printf '%s\n' "$excerpt" > /tmp/release_notes.md
          fi
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Normalize asset globs (spaces -> newlines)
        id: globs
        env:
          RAW_GLOBS: ${{ inputs.assets-glob }}
        run: |
          set -euo pipefail
          # softprops/action-gh-release `files` splits on NEWLINES only; accept
          # space-separated values too by normalizing all whitespace runs.
          {
            echo 'paths<<GOODVIBES_GLOBS_EOF'
            tr -s ' \t' '\n' <<< "$RAW_GLOBS" | sed '/^$/d'
            echo 'GOODVIBES_GLOBS_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Generate SHA256SUMS (missing asset is fatal)
        env:
          NORMALIZED_GLOBS: ${{ steps.globs.outputs.paths }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=()
          while IFS= read -r glob; do
            [ -n "$glob" ] || continue
            for match in $glob; do assets+=( "$match" ); done
          done <<< "$NORMALIZED_GLOBS"
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No assets matched ${{ inputs.assets-glob }}" >&2
            exit 1
          fi
          bunx ${{ inputs.toolchain-spec }} goodvibes-sha256sums --out "${{ inputs.sha256-name }}" "${assets[@]}"
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: ${{ steps.changelog.outputs.body }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.globs.outputs.paths }}
            ${{ inputs.sha256-name }}
