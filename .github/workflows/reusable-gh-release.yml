# Reusable: GitHub Release (changelog excerpt + SHA256SUMS + assets)
#
# Consumer contract
#   Creates a GitHub Release for a tag: extracts the tag's CHANGELOG section as
#   the release body, generates a SHA256SUMS manifest over the staged assets via
#   the toolchain `sha256sums` CLI (a missing asset is fatal), and uploads the
#   assets with a pinned softprops/action-gh-release. One copy, parameterized by
#   the asset manifest.
#
#   Call it:
#     jobs:
#       gh-release:
#         uses: mgd34msu/goodvibes-sdk/.github/workflows/reusable-gh-release.yml@main
#         with:
#           tag: ${{ github.ref_name }}
#           artifact-name: release-assets
#           assets-glob: "dist/goodvibes-*"
#
#   Inputs:  tag (required), artifact-name (a CI artifact to download into
#            dist/, optional), assets-glob (files to hash + upload), changelog-
#            path (default CHANGELOG.md), sha256-name (default SHA256SUMS.txt),
#            bun-version.
#   Runs on ubuntu-24.04 so awk changelog extraction stays GNU-stable.

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      artifact-name:
        description: Optional CI artifact to download into ./dist before staging.
        required: false
        type: string
        default: ""
      assets-glob:
        description: Shell glob (relative to repo root) of assets to checksum + upload.
        required: true
        type: string
      changelog-path:
        required: false
        type: string
        default: CHANGELOG.md
      sha256-name:
        required: false
        type: string
        default: SHA256SUMS.txt
      bun-version:
        required: false
        type: string
        default: "1.3.10"
      toolchain-spec:
        required: false
        type: string
        default: "@pellux/goodvibes-toolchain"

permissions:
  contents: read

jobs:
  gh-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Download release artifact
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.artifact-name }}
          path: dist
      - name: Extract changelog excerpt
        id: changelog
        env:
          VERSION: ${{ inputs.tag }}
          CHANGELOG_PATH: ${{ inputs.changelog-path }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          excerpt="$(awk -v version="$version" '
            $0 ~ "^## (\\[)?" version "([]) -]|$)" { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' "$CHANGELOG_PATH")"
          if [ -z "$excerpt" ]; then excerpt="Release ${version}"; fi
          printf '%s\n' "$excerpt" > /tmp/release_notes.md
          echo "body=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Generate SHA256SUMS (missing asset is fatal)
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=( ${{ inputs.assets-glob }} )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No assets matched ${{ inputs.assets-glob }}" >&2
            exit 1
          fi
          bunx ${{ inputs.toolchain-spec }} goodvibes-sha256sums --out "${{ inputs.sha256-name }}" "${assets[@]}"
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: ${{ steps.changelog.outputs.body }}
          fail_on_unmatched_files: true
          files: |
            ${{ inputs.assets-glob }}
            ${{ inputs.sha256-name }}
